<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>Transaction Details</title>

        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
        <link rel="stylesheet" href="style.css">
    </head>

    <body class="p-4">

        <h4 class="text-center">TRANSACTION DETAILS</h4>
        <div class="container">

            <table class="table table-bordered table-striped">
                <thead class="table-dark">
                    <tr>
                        <th>TransactionId</th>
                        <th>TransactionDate</th>
                        <th>Header</th>
                        <th>Credit</th>
                        <th>Debit</th>
                        <th></th>
                    </tr>
                </thead>

                <tbody>
                    <tr id="addRow">
                        <td><input type="number" id="tid" class="form-control" placeholder="TransactionId"></td>
                        <td><input type="date" id="tdate" class="form-control"></td>
                        <td><input type="text" id="theader" class="form-control" placeholder="Header"></td>
                        <td><input type="number" id="tcredit" class="form-control" placeholder="Credit"></td>
                        <td><input type="number" id="tdebit" class="form-control" placeholder="Debit"></td>
                        <td>
                            <button id="addBtn" class="btn btn-primary btn-sm">ADD</button>
                        </td>
                    </tr>
                    <tr>
                        <td colspan="6">
                        <div id="errorBox" class="text-danger fw-bold text-center"></div>
                        </td>
                    </tr>
                </tbody>

                <tbody id="txnBody"></tbody>

                <tfoot>
                    <tr class="table-secondary fw-bold">
                        <td></td>
                        <td></td>
                        <td>Totals</td>
                        <td id="totalCredit">0</td>
                        <td id="totalDebit">0</td>
                        <td></td>
                    </tr>

                    <tr class="table-primary fw-bold">
                        <td></td>
                        <td></td>
                        <td>Balance</td>
                        <td></td>
                        <td id="balance">0</td>
                        <td></td>
                    </tr>
                </tfoot>
            </table>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script src="script.js"></script>

    </body>
</html>
